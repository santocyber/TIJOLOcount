server {
    listen 80;
    server_name tijolocount.exemplo.com;

    root /caminho/para/TIJOLOcount/html;
    index index.html;

    # Gzip para Three.js + JSON
    gzip on;
    gzip_types text/css application/javascript application/json model/gltf-binary;

    # Cache de arquivos estaticos (1 ano)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback para SPA (se quiser futuramente)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
